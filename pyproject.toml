[project]
name = "manystore"
version = "0.0.1"
description = "ストレージ抽象（local / nats / s3 バックエンド）。差し替え可能な backend を共通 IF の背後に隠す独立ライブラリ。"
requires-python = ">=3.14"
# 実行依存（重い backend は各 backend のメソッド内で遅延 import する）。
dependencies = [
    "redis>=5.0.0",
    "nats-py>=2.0.0",
    "aiobotocore>=2.0.0",
    "httpx>=0.27.0",
]

# UI/サーバ層は任意。`pip install manystore[server]` のときだけ重い依存が入る。
# server/ 内では fastapi/uvicorn を遅延 import するので、未インストールでも本体は動く。
[project.optional-dependencies]
server = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "watchdog>=4.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    # server 層のテスト（ASGI TestClient = starlette + httpx）に必要。httpx は本体依存にも含む。
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "watchdog>=4.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["manystore"]

[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
