# manystore storage UI — 開発用設定（使い捨てストレージを既定にする）。
# 起動: make ui      （= uv run python -m manystore.server --config examples/manystore-ui.dev.toml）
#
# 既定ストレージは .cache/manystore_dev（.gitignore 済み＝使い捨て）。起動時に自動作成される
# （LocalKeyValueStore が dir を mkdir する）ので、事前準備は不要。

default_context = "dev"

# ── 開発用の汎用ストレージ（既定） ──
[contexts.dev]
backend = "local"
root = ".cache/manystore_dev"

# ── このリポの .work も覗ける（interrupt 投入の動作確認用） ──
[contexts.work]
backend = "local"
root = ".work"

[[views.featured]]
context = "work"
path = "skills/memory-bank/interrupt"
label = "Interrupt"
pin = true
quick_write = true
