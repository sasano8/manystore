services:
  # redis そのものに pub/sub の概念がある
  # redis は channel をデフォルトで 15個持つ。これはアプリレベルで領域を分けるので利用できる
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # volumes:
    #   - ./.cache/redis:/data

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    # volumes:
    #   - ./.cache/nats:/data

  # 分散ファイルストレージで S3 互換ゲートウェイを提供(Apache-2.0)
  # master + volume + filer + s3 gateway を単一プロセスで起動
  seaweedfs:
    image: chrislusf/seaweedfs
    ports:
      - "9333:9333"   # Master UI (http://localhost:9333)
      - "23646:23646" # Admin UI (http://localhost:23646)
      - "8333:8333"   # S3 API
      - "8888:8888"   # Filer  # filer の上で S3 が提供される
      - "9340:9340"   # Volume  # Filer へのリクエストはマスターを通り Volume に転送される
      # - "7333:7333"   # WebDAV
      - "8181:8181"   # ICEBERG
    command: "mini -dir=/data"
    # command: "server -dir=/data"  # server 版の方が本番向け
    # volumes:
    #   - ./.cache/seaweedfs:/data

  # S3 互換ストレージ（AWS セマンティクスを忠実に追従＝条件付き PUT=CAS を原子強制する）。
  # SeaweedFS が満たさない put_if_absent/put_if_match の絶対契約を実機検証するために併設する
  # （conformance の s3 実装マトリクス。詳細は tests/conformance_providers.py の S3_IMPLS）。
  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    # volumes:
    #   - ./.cache/minio:/data
